<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Profe Nelson IA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:white;font-family:'Inter',sans-serif}
canvas{position:fixed;top:0;left:0;z-index:-1}

nav{position:fixed;width:100%;top:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(15px);padding:15px 30px;display:flex;justify-content:space-between;z-index:1000}
nav a{color:white;text-decoration:none;margin:0 10px}
nav a:hover{color:#00e0ff}

.hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.hero h1{font-family:'Orbitron';font-size:3.5rem;background:linear-gradient(90deg,#00c3ff,#8a2be2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.btn{padding:12px 25px;border-radius:10px;background:linear-gradient(90deg,#00c3ff,#8a2be2);color:white;text-decoration:none;display:inline-block;margin-top:15px}

section{padding:100px 20px;max-width:1100px;margin:auto}
h2{font-family:'Orbitron';color:#00e0ff;margin-bottom:20px}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;transition:.3s}
.card:hover{transform:scale(1.05);box-shadow:0 0 25px #00c3ff}
.card a{color:white;text-decoration:none}

/* CHAT */
.chat{position:fixed;bottom:20px;right:20px;width:320px;background:#111;border-radius:15px;box-shadow:0 0 20px #00c3ff;overflow:hidden}
.chat-header{background:#00c3ff;padding:10px;color:black;font-weight:bold}
.chat-body{height:220px;overflow-y:auto;padding:10px;font-size:14px}
.chat-input{display:flex}
.chat-input input{flex:1;padding:10px;border:none}
.chat-input button{padding:10px;border:none;background:#00c3ff}

footer{text-align:center;padding:20px;background:#05050a}
</style>
</head>

<body>
<canvas id="bg"></canvas>

<nav>
<div><strong>Profe Nelson IA</strong></div>
<div>
<a href="#inicio">Inicio</a>
<a href="#cursos">Cursos</a>
</div>
</nav>

<section class="hero" id="inicio">
<div>
<h1>Plataforma IA Educativa</h1>
<p>Aprende IA por niveles 🚀</p>
<a href="#cursos" class="btn">Entrar a cursos</a>
</div>
</section>

<section id="cursos">
<h2>🎓 Cursos por grado</h2>
<div class="cards">
<div class="card"><a href="grado6.html">Grado 6°</a></div>
<div class="card"><a href="grado7.html">Grado 7°</a></div>
<div class="card"><a href="grado8.html">Grado 8°</a></div>
<div class="card"><a href="grado9.html">Grado 9°</a></div>
<div class="card"><a href="grado10.html">Grado 10°</a></div>
<div class="card"><a href="grado11.html">Grado 11°</a></div>
</div>
</section>

<!-- CHAT REAL (SIMULADO LISTO PARA API) -->
<div class="chat">
<div class="chat-header">🤖 Asistente IA</div>
<div class="chat-body" id="chatBody"></div>
<div class="chat-input">
<input id="chatInput" placeholder="Pregunta algo...">
<button onclick="sendMessage()">➤</button>
</div>
</div>

<footer>
<p>© 2026 El Profe Nelson IA</p>
</footer>

<script>
// PARTICLES
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
for(let i=0;i<60;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2})}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#00c3ff';particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();p.y+=0.3;if(p.y>canvas.height)p.y=0});requestAnimationFrame(draw)}
draw();

// CHAT (LISTO PARA API REAL)
async function sendMessage(){
let input=document.getElementById('chatInput');
let body=document.getElementById('chatBody');
let userMsg=input.value;
if(!userMsg)return;
body.innerHTML+=`<p><b>Tú:</b> ${userMsg}</p>`;
input.value="";
body.scrollTop=body.scrollHeight;

// RESPUESTA SIMULADA (AQUÍ VA API REAL)
let respuesta="(Conecta aquí una API de IA para respuestas reales)";

body.innerHTML+=`<p><b>IA:</b> ${respuesta}</p>`;
body.scrollTop=body.scrollHeight;
}
</script>

</body>
</html>
