<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Profe Nelson IA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Orbitron', sans-serif;
}

body{
    background:#050508;
    color:white;
    overflow-x:hidden;
}

/* RED NEURONAL CANVAS */
#network{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
}

/* CIRCUITOS */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background-image:
    linear-gradient(#4b5cff22 1px, transparent 1px),
    linear-gradient(90deg, #4b5cff22 1px, transparent 1px);
    background-size:50px 50px;
    animation: moveGrid 25s linear infinite;
    z-index:-1;
}

@keyframes moveGrid{
    0%{transform:translate(0,0);}
    100%{transform:translate(-50px,-50px);}
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(12px);
    padding:15px;
    display:flex;
    justify-content:space-between;
    z-index:1000;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

nav a:hover{
    color:#9aa7ff;
    text-shadow:0 0 10px #9aa7ff;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: linear-gradient(270deg,#050508,#1a1a40,#3a4dff,#050508);
    background-size:400% 400%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.hero h1{
    font-size:3rem;
    text-shadow:0 0 25px #3a4dff;
}

.hero button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    background:#3a4dff;
    color:white;
    border-radius:12px;
    box-shadow:0 0 20px #3a4dff;
    cursor:pointer;
}

/* SECCIONES */
section{
    padding:100px 20px;
    max-width:1100px;
    margin:auto;
}

h2{
    color:#9aa7ff;
    text-shadow:0 0 10px #9aa7ff;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.03);
    padding:25px;
    border-radius:20px;
    transition:0.4s;
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px #3a4dff;
}

/* SCROLL */
.fade{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

footer{
    text-align:center;
    padding:30px;
    background:#05050a;
}
</style>
</head>

<body>

<canvas id="network"></canvas>

<nav>
    <div><strong>Profe Nelson IA</strong></div>
    <div>
        <a href="#inicio">Inicio</a>
        <a href="#ia">IA</a>
        <a href="#recursos">Recursos</a>
    </div>
</nav>

<section class="hero" id="inicio">
    <div>
        <h1>Red Neuronal Activa</h1>
        <p>Educación + IA + Futuro 🚀</p>
        <button onclick="scrollToSection('ia')">Entrar</button>
    </div>
</section>

<section id="ia" class="fade">
    <h2>🤖 IA para Docentes</h2>
    <p>Transforma tu enseñanza con inteligencia artificial.</p>
</section>

<section id="recursos" class="fade">
    <h2>📚 Recursos</h2>
    <div class="cards">
        <div class="card">
            <h3>Prompts</h3>
        </div>
        <div class="card">
            <h3>Clases IA</h3>
        </div>
        <div class="card">
            <h3>Automatización</h3>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Profe Nelson IA</p>
</footer>

<script>
// SCROLL
function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// ANIMACIÓN SCROLL
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    faders.forEach(el => {
        if(el.getBoundingClientRect().top < window.innerHeight - 100){
            el.classList.add('show');
        }
    });
});

// RED NEURONAL
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];

for(let i=0;i<80;i++){
    nodes.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        vx: (Math.random()-0.5)*1,
        vy: (Math.random()-0.5)*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    nodes.forEach(n=>{
        n.x += n.vx;
        n.y += n.vy;

        if(n.x<0||n.x>canvas.width) n.vx*=-1;
        if(n.y<0||n.y>canvas.height) n.vy*=-1;

        ctx.beginPath();
        ctx.arc(n.x,n.y,2,0,Math.PI*2);
        ctx.fillStyle="#4b5cff";
        ctx.fill();
    });

    for(let i=0;i<nodes.length;i++){
        for(let j=i+1;j<nodes.length;j++){
            let dx = nodes[i].x - nodes[j].x;
            let dy = nodes[i].y - nodes[j].y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 120){
                ctx.beginPath();
                ctx.moveTo(nodes[i].x,nodes[i].y);
                ctx.lineTo(nodes[j].x,nodes[j].y);
                ctx.strokeStyle="rgba(75,92,255,0.2)";
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
